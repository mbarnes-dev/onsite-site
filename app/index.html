<!DOCTYPE html>
<!-- OnSite PRODUCTION app (doc 78/79, slice 1c + gate pass) — talks to onsite-prod (real multi-tenant
     backend, RLS). Lives in app/ and deploys as its OWN Vercel project on its OWN ORIGIN (review-2 T1-1:
     the prod session token must never share an origin with the demo's innerHTML surface).
     STRICT CSP: no inline scripts — all JS is external (boot.mjs sets window.OnSiteCore; app.js is the app).
     The demo stays on onsite-site.vercel.app, untouched. -->
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OnSite — produksjon</title>
<!-- small pass (doc 81): installability — manifest is the beforeinstallprompt prerequisite on Android;
     iOS reads the icon/title for Legg til på Hjem-skjerm. NB standalone iOS + magic-LINK login is a known
     wrinkle (the link opens in Safari, not the installed app) — login-code flow is the v2 fix if it bites. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f766e">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="apple-mobile-web-app-title" content="OnSite">
<!-- onboarding B: vendored Leaflet (no CDN — strict CSP script-src 'self'); Kartverket tiles via img-src -->
<link rel="stylesheet" href="vendor/leaflet/leaflet.css">
<link rel="stylesheet" href="app.css?v=7">
</head>
<body>
<div class="wrap"><div id="app"></div></div>
<!-- onboarding C: the board leave-behind (doc-50) renders here, OUTSIDE #app — render() rewrites #app
     wholesale, and the print path isolates this node by VISIBILITY so its Leaflet maps survive onto paper. -->
<div id="printdoc" aria-hidden="true"></div>

<script src="vendor/supabase-js.min.js"></script>
<!-- @onsite/core: same committed static ESM bundle as the demo, built into app/ by packages/core/build.mjs -->
<script type="module" src="boot.mjs?v=2"></script>
<!-- offline v1.5 (doc-80): IDB cache + outbox + photo queue + review store + SW registration — MUST load before app.js -->
<script src="vendor/leaflet/leaflet.js"></script>
<script src="offline.js?v=3"></script>
<script src="app.js?v=12"></script>
</body>
</html>
